name: Daily Personal Log Report

on:
  schedule:
    # 8:30 AM UTC daily. Adjust for your timezone:
    # UTC+0  → '30 8 * * *'
    # EST (UTC-5) 8:30am → '30 13 * * *'
    # BST (UTC+1) 8:30am → '30 7 * * *'
    - cron: '30 8 * * *'
  workflow_dispatch:  # lets you trigger a run manually from the GitHub Actions UI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  generate-report:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt azure-storage-blob

      - name: Run ETL (download from OneDrive + transform)
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ONEDRIVE_REFRESH_TOKEN: ${{ secrets.ONEDRIVE_REFRESH_TOKEN }}
          ONEDRIVE_FILE_PATH: ${{ secrets.ONEDRIVE_FILE_PATH }}
        run: python personal_log_etl_cloud.py

      - name: Generate HTML report
        run: python visualize_log.py

      - name: Upload report to Azure Blob Storage
        env:
          AZURE_STORAGE_CONNECTION_STRING: ${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}
        run: |
          python - <<'EOF'
          import os
          from azure.storage.blob import BlobServiceClient, ContentSettings
          conn_str = os.environ["AZURE_STORAGE_CONNECTION_STRING"]
          client = BlobServiceClient.from_connection_string(conn_str)
          with open("data/daily_report.html", "rb") as f:
              client.get_blob_client("$web", "daily_report.html").upload_blob(
                  f, overwrite=True,
                  content_settings=ContentSettings(content_type="text/html")
              )
          print("Report uploaded.")
          EOF
